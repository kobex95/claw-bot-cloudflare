name = "claw-bot-cloudflare"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# KV namespace for skills storage
[[kv_namespaces]]
binding = "KV_SKILLS"
id = "6717aa4238004db28d8850eeab69d76e"

# D1 database for long-term memory
[[d1_databases]]
binding = "DB_MEMORY"
database_name = "claw-memory"
database_id = "96b90725-97e4-4af5-9b7d-16e5fa1fcc1f"

# Durable Object for session management
[[durable_objects.bindings]]
name = "SESSION_DO"
class_name = "SessionDO"

[[migrations]]
tag = "v1"
new_classes = ["SessionDO"]

# Cron triggers for heartbeat and maintenance
[triggers]
crons = ["*/5 * * * *"]

# Environment variables (sensitive ones set via wrangler secret)
[vars]
LLM_PROVIDER = "openai-compatible"
LLM_MODEL = "qwen3-coder-plus"
LLM_BASE_URL = "https://apis.iflow.cn/v1"
